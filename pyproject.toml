[project]
name = "that-game"
version = "0.0.1.13"
description = "Add your description here"
authors = [
    { name = "tanzhijian", email = "tanzhijianorg@outlook.com" }
]
dependencies = [
    "pandas>=2.2.3",
    "pydantic>=2.9.2",
    "matplotlib>=3.9.2",
    "mplsoccer>=1.4.0",
]
readme = "README.md"
requires-python = ">= 3.10"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.rye]
managed = true
dev-dependencies = [
    "ruff>=0.7.0",
    "mypy>=1.12.1",
    "pytest>=8.3.3",
    "ipykernel>=6.29.5",
]

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/that_game"]


[tool.ruff]
lint.select = ["E", "F", "I"]
line-length = 88

[tool.mypy]
ignore_missing_imports = true
strict = true
plugins = ["pydantic.mypy"]

[tool.pytest.ini_options]
testpaths = ["tests",]

[tool.pyright]
venvPath = "."
venv = ".venv"
